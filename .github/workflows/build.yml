name: Build stls CLI with bundled sing-box

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  download-sing-box:
    runs-on: windows-latest
    outputs:
      url: ${{ steps.download.outputs.download_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download sing-box
        id: download
        run: |
          $url="https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "sing-box.zip"
          echo "download_url=$(Get-Location)/sing-box.zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box
          path: sing-box.zip

  build:
    needs: download-sing-box
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download sing-box
        uses: actions/download-artifact@v4
        with:
          name: sing-box
          path: bin/

      - name: Extract sing-box
        working-directory: bin
        run: |-
          powershell -Command "
          Expand-Archive -Path sing-box.zip -DestinationPath .
          Remove-Item 'sing-box.zip' -Force
          "

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: |
          cargo build --release
          echo "stls binaries: $(ls -la target/release/)"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stls-release
          path: |
            target/release/stls.exe
            bin/sing-box.exe
            target/release/deps/*.dll