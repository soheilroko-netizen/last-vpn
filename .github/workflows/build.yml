name: Build stls CLI (Windows)

on:
  push:
    branches: [main, v4]
    tags: ['v*']
  pull_request:
    branches: [main, v4]

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows CLI (MSVC)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: stls-windows-x64
          path: target/x86_64-pc-windows-msvc/release/stls.exe
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/stls.exe
          draft: false
          prerelease: false
          generate_release_notes: true
