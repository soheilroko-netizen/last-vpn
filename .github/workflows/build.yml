name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-msvc:
    name: Build Windows (MSVC)
    runs-on: windows-latest
    timeout-minutes: 60
    
    env:
      RUSTFLAGS: '-C target-cpu=x86-64-v2'
    
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            node_arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust_target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust_target }}-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: ${{ matrix.node_arch }}
          cache: 'npm'

      - name: Generate package-lock.json
        run: npm install --package-lock-only
        working-directory: ./

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./

      - name: Build frontend
        run: npm run build
        working-directory: ./

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stls-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            !**/symbols/**
          retention-days: 30

  build-gnu:
    name: Build Windows (GNU)
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (GNU)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-gnu
          components: llvm-tools-preview

      - name: Ensure llvm-tools-preview (provides llvm-windres)
        run: rustup component add llvm-tools-preview
        shell: bash

      - name: Install mingw-w64 (provides windres.exe)
        run: |
          choco install mingw-w64 -y --no-progress
        shell: cmd
        continue-on-error: true

      - name: Locate/create windres for Tauri resource (GNU)
        run: |
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          $dest = Join-Path $cargoBin "windres.exe"

          # Candidate windres locations (in priority order)
          $candidates = @(
            (Join-Path $cargoBin "llvm-windres.exe"),
            "C:\ProgramData\chocolatey\tools\mingw64\bin\windres.exe",
            "C:\ProgramData\chocolatey\tools\mingw64\bin\x86_64-w64-mingw32-windres.exe",
            "C:\ProgramData\chocolatey\tools\mingw-w64\mingw64\bin\windres.exe",
            "C:\msys64\mingw64\bin\windres.exe",
            "C:\msys64\mingw64\bin\x86_64-w64-mingw32-windres.exe"
          )

          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $found = $c; break }
          }

          # Fallback: recursive search under common roots
          if (-not $found) {
            $roots = @(
              "C:\ProgramData\chocolatey\tools",
              "C:\ProgramData\chocolatey\lib",
              "C:\msys64",
              "$env:USERPROFILE\.rustup",
              "$env:USERPROFILE\.cargo"
            )
            foreach ($r in $roots) {
              if (Test-Path $r) {
                $hit = Get-ChildItem -Path $r -Recurse -Include windres.exe,llvm-windres.exe,x86_64-w64-mingw32-windres.exe -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($hit) { $found = $hit.FullName; break }
              }
            }
          }

          if ($found) {
            Copy-Item $found $dest -Force
            echo "copied $found -> $dest"
          } else {
            echo "ERROR: no windres found anywhere. Candidates checked:"
            $candidates | ForEach-Object { echo "  $_" }
            echo "--- choco mingw install state ---"
            choco list --local-only 2>$null | Select-String mingw
            exit 1
          }

          # Add cargo bin (windres.exe + toolchain) and mingw bin to PATH
          $mingwBin = Split-Path $found
          echo "$cargoBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Verify windres is GNU-compatible
        run: |
          windres --version
        shell: pwsh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-gnu-windres2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gnu-windres2-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: x64
          cache: 'npm'

      - name: Generate package-lock.json
        run: npm install --package-lock-only

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (GNU)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: ""
          WINDRES: ${{ 'C:\\Users\\runneradmin\\.cargo\\bin\\windres.exe' }}
        with:
          args: --target x86_64-pc-windows-gnu

      - name: Upload artifacts (GNU)
        uses: actions/upload-artifact@v4
        with:
          name: stls-gnu
          path: |
            src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**/*
            !**/symbols/**
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-msvc, build-gnu]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.exe" -o -name "*.msi" -o -name "*.zip" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true