name: Build stls CLI with bundled sing-box

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download sing-box
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/SagerNet/sing-box/releases/latest" -Headers @{ "User-Agent" = "stls" }
          $tag = $release.tag_name
          $assetName = "sing-box-$($tag.TrimStart('v'))-windows-amd64.zip"
          $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) { throw "Asset $assetName not found in release $tag" }
          Write-Host "Downloading $($asset.name) from $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "sing-box.zip"

      - name: Extract sing-box (to staging dir)
        shell: pwsh
        run: |
          # Extract to temp, find sing-box.exe
          Expand-Archive -Path "sing-box.zip" -DestinationPath "staged" -Force
          Remove-Item "sing-box.zip"
          $exe = Get-ChildItem -Path "staged" -Filter "sing-box.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "sing-box.exe not found in zip" }

      - name: Build stls
        shell: pwsh
        run: |
          cargo build --release

      - name: Bundle sing-box with stls
        shell: pwsh
        run: |
          # Copy sing-box.exe next to stls.exe
          $stlsDir = Join-Path (Get-Location) "target\release"
          $stagedExe = Get-ChildItem -Path "staged" -Filter "sing-box.exe" -Recurse | Select-Object -First 1
          
          # Copy to release dir
          Copy-Item $stagedExe.FullName (Join-Path $stlsDir "sing-box.exe") -Force
          Write-Host "Bundled sing-box.exe to: $(Join-Path $stlsDir 'sing-box.exe')"
          
          # List files for action
          Get-ChildItem -Path $stlsDir -Filter "*.exe" | Format-Table -Auto
          
          # Cleanup
          Remove-Item -Path "staged" -Recurse -Force

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stls-windows
          path: |
            target/release/stls.exe
            target/release/sing-box.exe