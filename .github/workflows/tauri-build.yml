name: Tauri Build
on:
  push:
    branches: [main, v6, wd-relay]
  pull_request:
    branches: [main, v6, wd-relay]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Cargo Dependencies
        run: |
          cd src-tauri
          cargo fetch

      - name: Download sing-box
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/SagerNet/sing-box/releases/latest" -Headers @{"User-Agent"="stls"}
          $tag = $release.tag_name.TrimStart('v')
          Write-Host "sing-box version: $tag"
          $zip = "sing-box-$tag-windows-amd64.zip"
          $asset = $release.assets | Where-Object { $_.name -eq $zip } | Select-Object -First 1
          if (-not $asset) { throw "Asset $zip not found" }
          Write-Host "Downloading $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile sb.zip
          New-Item -ItemType Directory -Force src-tauri/bin | Out-Null
          tar -xf sb.zip -C src-tauri/bin --strip-components=1 "sing-box-$tag-windows-amd64/sing-box.exe"
          Get-ChildItem src-tauri/bin/sing-box.exe | Select-Object Name, Length

      - name: Download WinDivert
        shell: pwsh
        run: |
          # WinDivert 2.2.2 A variant
          Invoke-WebRequest -Uri "https://reqrypt.org/download/WinDivert-2.2.2-A.zip" -OutFile wd.zip
          New-Item -ItemType Directory -Force src-tauri/bin | Out-Null
          tar -xf wd.zip -C src-tauri/bin --strip-components=1 "WinDivert-2.2.2-A/x64/WinDivert.dll" "WinDivert-2.2.2-A/x64/WinDivert64.sys"
          if (-not (Test-Path "src-tauri/bin/WinDivert.dll")) { throw "WinDivert.dll not extracted!" }
          if (-not (Test-Path "src-tauri/bin/WinDivert64.sys")) { throw "WinDivert64.sys not extracted!" }
          Write-Host "WinDivert DLL: $(Get-Item src-tauri/bin/WinDivert.dll | % Length) bytes"
          Write-Host "WinDivert SYS: $(Get-Item src-tauri/bin/WinDivert64.sys | % Length) bytes"

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: stls-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
