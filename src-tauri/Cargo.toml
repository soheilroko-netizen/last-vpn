[package]
name = "stls"
version = "0.1.0"
edition = "2021"
description = "User-friendly ShadowTLS client for Windows"
authors = ["soheilroko-netizen"]
license = "MIT"
repository = "https://github.com/soheilroko-netizen/stls"

[dependencies]
tauri = { version = "2", features = ["tray-icon", "dialog", "fs", "shell", "log", "notification", "os", "store", "updater"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full", "macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
bytes = "1"
base64 = "0.22"
rand = "0.8"
zeroize = "1"
percent-encoding = "2"
md5 = "0.7"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
blake3 = "1"
hkdf = "0.12"
hmac = "0.12"
sha1 = "0.10"
sha2 = "0.10"
async-trait = "0.1"
tauri-plugin-store = "2"
tauri-plugin-log = "2"
tauri-plugin-opener = "2"
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-os = "2"

[build-dependencies]
tauri-build = "2"