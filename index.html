<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dakal-tls</title>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>
<div id="app">
  <!-- macOS-style title bar -->
  <div class="titlebar">
    <div class="window-dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <span class="titlebar-text">dakal-tls — ShadowTLS VPN</span>
  </div>

  <div class="content">
    <!-- Shield + app name -->
    <div class="logo-section">
      <div class="shield-icon">🛡️</div>
      <h1>dakal-tls</h1>
      <p class="subtitle">ShadowTLS + Shadowsocks VPN — sing-box powered</p>
    </div>

    <!-- Status card -->
    <div class="status-card">
      <span class="status-indicator" id="status-dot"></span>
      <span class="status-text" id="status-text">Disconnected</span>
    </div>

    <!-- Info grid 2x2 -->
    <div class="info-grid">
      <div class="info-item">
        <div class="label">SERVER</div>
        <div class="value" id="server-val">ns.baft.uk:8553</div>
      </div>
      <div class="info-item">
        <div class="label">SOCKS5</div>
        <div class="value" id="socks5-val">127.0.0.1:1080</div>
      </div>
      <div class="info-item">
        <div class="label">SHADOWSOCKS</div>
        <div class="value" id="ss-val">Port 8380</div>
      </div>
      <div class="info-item">
        <div class="label">PROFILE</div>
        <div class="value" id="profile-val">Default</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="btn-start" class="btn btn-start">▶ Start</button>
      <button id="btn-stop" class="btn btn-stop" disabled>■ Stop</button>
      <button id="btn-settings" class="btn btn-secondary">⚙ Settings</button>
    </div>

    <!-- Message -->
    <div id="message" class="message"></div>

    <!-- Tray indicator -->
    <div class="tray-info">
      <span>🛡️ Runs in system tray</span>
      <span class="badge-green">Tray ✓</span>
    </div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
