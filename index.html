<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dakal-tls - ShadowTLS VPN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-deep-space: #050315;
            --bg-stars: #0a0a20;
            --saturn-color: #c9a66b;
            --saturn-ring: #8b7355;
            --button-power: #00ff88;
            --button-power-glow: rgba(0, 255, 136, 0.5);
            --button-text: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00ccff;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-deep-space) 0%, var(--bg-stars) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated stars background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 80% 70%, rgba(0, 200, 255, 0.6), transparent),
                radial-gradient(3px 3px at 40% 20%, rgba(255, 255, 255, 0.4), transparent);
            background-size: 400px 400px, 300px 300px, 250px 250px;
            animation: twinkle 20s infinite linear;
            z-index: -2;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        /* Saturn planet */
        .saturn-container {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 200px;
            height: 200px;
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .saturn {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .saturn-body {
            width: 60px;
            height: 60px;
            background: conic-gradient(
                from 0deg,
                var(--saturn-color) 0deg,
                var(--saturn-color) 60deg,
                #d2b48c 60deg,
                #cd853f 120deg,
                var(--saturn-color) 120deg
            );
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 20px;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.3),
                0 0 30px rgba(201, 166, 107, 0.5);
        }
        
        .saturn-ring {
            width: 140px;
            height: 20px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                var(--saturn-ring) 30deg,
                var(--saturn-ring) 60deg,
                transparent 60deg
            );
            border-radius: 50%;
            position: absolute;
            top: 70px;
            left: -10px;
            animation: ringRotate 20s infinite linear;
        }
        
        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Main container */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Logo/Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--neon-blue), var(--button-power));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(0, 204, 255, 0.4);
        }
        
        .logo-text {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
        }
        
        /* Status card */
        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 100%;
        }
        
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .status-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--button-power);
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Info grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .info-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }
        
        .info-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Power/Connect Button */
        .power-section {
            text-align: center;
            margin: 40px 0;
        }
        
        .power-button-container {
            position: relative;
            display: inline-block;
        }
        
        .power-button {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 255, 136, 0.05));
            border: 2px solid var(--button-power);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }
        
        .power-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--button-power), transparent);
            opacity: 0.5;
            animation: pulse 3s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        .power-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px var(--button-power-glow);
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.1));
        }
        
        .power-button:active {
            transform: scale(0.98);
        }
        
        .power-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            z-index: 1;
        }
        
        .power-icon svg {
            width: 60px;
            height: 60px;
            fill: var(--button-power);
            filter: drop-shadow(0 0 10px var(--button-power-glow));
        }
        
        .power-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--button-text);
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
            text-shadow: 0 0 10px var(--button-power-glow);
        }
        
        .power-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 500;
        }
        
        /* Settings button */
        .settings-section {
            text-align: center;
            margin-top: 40px;
        }
        
        .settings-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 30px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        
        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 4px 20px rgba(0, 204, 255, 0.2);
        }
        
        /* Terminal footer */
        .terminal-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--card-border);
            padding: 15px 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 100;
        }
        
        .terminal-content {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .terminal-prompt {
            color: var(--button-power);
            font-weight: 600;
        }
        
        .terminal-command {
            color: var(--text-primary);
        }
        
        /* Loading/Processing overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--button-power);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .saturn-container {
                width: 150px;
                height: 150px;
                top: 5%;
                right: 2%;
            }
            
            .power-button {
                width: 150px;
                height: 150px;
            }
            
            .power-icon {
                width: 40px;
                height: 40px;
            }
            
            .power-icon svg {
                width: 40px;
                height: 40px;
            }
            
            .logo-text {
                font-size: 32px;
            }
            
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Message toast */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1001;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        
        .message.show {
            opacity: 1;
            transform: translateX(0);
        }
        
        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--button-power);
            color: var(--button-power);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
        }
        
        .message.error {
            background: rgba(255, 59, 59, 0.1);
            border: 1px solid #ff3b3b;
            color: #ff3b3b;
            box-shadow: 0 4px 20px rgba(255, 59, 59, 0.3);
        }
    </style>
</head>
<body>
    <!-- Saturn planet in background -->
    <div class="saturn-container">
        <div class="saturn">
            <div class="saturn-body"></div>
            <div class="saturn-ring"></div>
        </div>
    </div>
    
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Initializing connection...</div>
        </div>
    </div>
    
    <!-- Message toast -->
    <div class="message" id="message"></div>
    
    <div class="main-container">
        <!-- Header/Logo -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">dakal-tls</div>
            </div>
            <div class="subtitle">ShadowTLS + Shadowsocks VPN</div>
        </div>
        
        <!-- Status Card -->
        <div class="status-card">
            <div class="status-header">
                <div class="status-label">Connection Status</div>
                <div class="status-value" id="statusValue">DISCONNECTED</div>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Server</div>
                    <div class="info-value" id="serverVal">loading...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">ShadowTLS</div>
                    <div class="info-value" id="stlsVal">loading...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Shadowsocks</div>
                    <div class="info-value" id="ssVal">loading...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">SNI</div>
                    <div class="info-value" id="sniVal">loading...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">SOCKS5 Local</div>
                    <div class="info-value" id="socks5Val">loading...</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Uptime</div>
                    <div class="info-value" id="uptimeVal">00:00:00</div>
                </div>
            </div>
        </div>
        
        <!-- Power/Connect Button -->
        <div class="power-section">
            <div class="power-button-container" id="powerButton">
                <div class="power-button">
                    <div class="power-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 9-12h-9L13 2z"/>
                        </svg>
                    </div>
                    <div class="power-text" id="powerText">CONNECT</div>
                    <div class="power-status" id="powerStatus">Ready to connect</div>
                </div>
            </div>
        </div>
        
        <!-- Settings Button -->
        <div class="settings-section">
            <button class="settings-btn" id="settingsBtn">
                ⚙️ Settings
            </button>
        </div>
    </div>
    
    <!-- Terminal footer -->
    <div class="terminal-footer">
        <div class="terminal-content">
            <span class="terminal-prompt">root@dakal:~$</span>
            <span class="terminal-command">sh -c "systemctl start stls-proxy"</span>
        </div>
    </div>
    
    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        
        let isConnected = false;
        let uptimeStart = null;
        let uptimeInterval = null;
        
        // Initialize status
        async function initialize() {
            try {
                showMessage('Initializing connection...', 'info');
                
                // Load config
                const config = await invoke('get_config');
                updateConfigDisplay(config);
                
                // Get status
                const status = await invoke('get_status');
                updateStatus(status);
                
                hideMessage();
            } catch (error) {
                showMessage('Failed to initialize: ' + error, 'error');
            }
        }
        
        // Update config display
        function updateConfigDisplay(config) {
            document.getElementById('serverVal').textContent = config.server_address || 'loading...';
            document.getElementById('stlsVal').textContent = config.stls_port ? `:${config.stls_port}` : 'loading...';
            document.getElementById('ssVal').textContent = config.ss_port ? `:${config.ss_port}` : 'loading...';
            document.getElementById('sniVal').textContent = config.stls_sni || 'loading...';
            document.getElementById('socks5Val').textContent = `127.0.0.1:${config.socks5_port || 1080}`;
        }
        
        // Update status and start uptime
        function updateStatus(connected) {
            isConnected = connected;
            const statusValue = document.getElementById('statusValue');
            const powerText = document.getElementById('powerText');
            const powerStatus = document.getElementById('powerStatus');
            const powerButton = document.getElementById('powerButton');
            
            if (connected) {
                statusValue.textContent = 'CONNECTED';
                statusValue.style.color = '#00ff88';
                powerText.textContent = 'CONNECTED';
                powerStatus.textContent = 'VPN active and protecting your connection';
                powerButton.style.borderColor = '#00ff88';
                powerButton.style.boxShadow = '0 0 50px rgba(0, 255, 136, 0.5)';
                
                // Start uptime counter
                if (!uptimeStart) {
                    uptimeStart = Date.now();
                    uptimeInterval = setInterval(updateUptime, 1000);
                }
            } else {
                statusValue.textContent = 'DISCONNECTED';
                statusValue.style.color = '#ff3b3b';
                powerText.textContent = 'CONNECT';
                powerStatus.textContent = 'Click to establish VPN connection';
                powerButton.style.borderColor = '#00ff88';
                powerButton.style.boxShadow = '0 4px 30px rgba(0, 255, 136, 0.3)';
                
                // Clear uptime
                if (uptimeStart) {
                    clearInterval(uptimeInterval);
                    uptimeStart = null;
                }
            }
        }
        
        // Update uptime display
        function updateUptime() {
            if (uptimeStart) {
                const elapsed = Date.now() - uptimeStart;
                const hours = Math.floor(elapsed / (1000 * 60 * 60));
                const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((elapsed % (1000 * 60)) / 1000);
                
                document.getElementById('uptimeVal').textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        // Power button click handler
        document.getElementById('powerButton').addEventListener('click', async () => {
            if (isConnected) {
                // Stop proxy
                try {
                    showMessage('Stopping VPN connection...', 'info');
                    await invoke('stop_proxy');
                    updateStatus(false);
                    showMessage('VPN stopped successfully', 'success');
                } catch (error) {
                    showMessage('Failed to stop VPN: ' + error, 'error');
                }
            } else {
                // Start proxy
                try {
                    showMessage('Establishing VPN connection...', 'info');
                    await invoke('start_proxy');
                    updateStatus(true);
                    showMessage('VPN connected successfully', 'success');
                } catch (error) {
                    showMessage('Failed to connect VPN: ' + error, 'error');
                }
            }
        });
        
        // Settings button click handler
        document.getElementById('settingsBtn').addEventListener('click', async () => {
            try {
                showMessage('Opening settings...', 'info');
                await invoke('open_settings');
                hideMessage();
            } catch (error) {
                showMessage('Failed to open settings: ' + error, 'error');
            }
        });
        
        // Message toast functions
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
            
            setTimeout(() => {
                hideMessage();
            }, 5000);
        }
        
        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.classList.remove('show');
        }
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            initialize();
            
            // Update status every 2 seconds
            setInterval(async () => {
                try {
                    const status = await invoke('get_status');
                    updateStatus(status);
                } catch (error) {
                    console.error('Status update failed:', error);
                }
            }, 2000);
        });
    </script>
</body>
</html>
