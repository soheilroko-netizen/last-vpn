<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dakal-tls — preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss:    #050507;
    --carbon:   #101010;
    --carbon-2: #16181c;
    --border:   #1f1d1b;
    --border-warm: #3d3a39;
    --green-1:  #00d992;
    --green-2:  #2fd6a1;
    --green-dim:#10b981;
    --white-1:  #f2f2f2;
    --parch:    #b8b3b0;
    --steel:    #8b949e;
    --danger:   #fb565b;
    --warn:     #ffba00;
    --mono:     'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    --inter:    'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--abyss);
    color: var(--white-1);
    font-family: var(--inter);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "calt","rlig";
    min-height: 100vh;
  }
  body { display:flex; justify-content:center; padding: 40px 16px; }

 .window {
    width: 460px;
    background: var(--carbon);
    border: 1px solid var(--border-warm);
    border-radius: 8px;
    box-shadow: rgba(0,0,0,0.7) 0 20px 60px,
                rgba(148,163,184,0.06) 0 0 0 1px inset;
    overflow: hidden;
    position: relative;
  }
  /* faint green top signal line */
  .window::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--green-1), transparent);
    opacity: 0.55;
  }

  /* ===== Title bar ===== */
  .titlebar {
    display:flex; align-items:center; gap:10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--steel);
  }
  .tb-dots { display:flex; gap:7px; }
  .tb-dots span { width:11px; height:11px; border-radius:50%; }
  .tb-dots .r { background:#ff5f57; }
  .tb-dots .y { background:#febc2e; }
  .tb-dots .g { background:#28c840; }
  .tb-text { flex:1; text-align:center; letter-spacing: 2.52px; text-transform: uppercase; font-size: 10px; font-weight: 600; color: var(--parch); }
  .tb-sig {
    width:7px; height:7px; border-radius:50%;
    background: var(--green-1);
    box-shadow: 0 0 6px var(--green-1), 0 0 12px rgba(0,217,146,0.5);
    animation: pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 4px var(--green-1), 0 0 8px rgba(0,217,146,0.4); }
    50% { box-shadow: 0 0 10px var(--green-1), 0 0 22px rgba(0,217,146,0.7); }
  }

  /* ===== Hero block ===== */
  .hero {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
  }
  .hero-row {
    display:flex; align-items:center; gap:12px;
  }
  .bolt {
    width: 28px; height: 28px; display:flex; align-items:center; justify-content:center;
    color: var(--green-1);
    filter: drop-shadow(0 0 4px rgba(0,217,146,0.7)) drop-shadow(0 0 10px rgba(0,217,146,0.3));
  }
  .bolt svg { width:100%; height:100%; }
  .name {
    font-family: var(--inter);
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.6px;
    color: var(--white-1);
    line-height: 1;
  }
  .tag {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: 2.52px; text-transform: uppercase;
    color: var(--green-1);
    padding: 3px 8px;
    border: 1px solid var(--green-1);
    border-radius: 9999px;
    margin-left: auto;
    background: rgba(0,217,146,0.06);
  }

  /* status line */
  .status {
    display:flex; align-items:center; gap:10px;
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--carbon-2);
    border-radius: 6px;
    border-left: 2px solid var(--danger);
    transition: border-color 0.25s;
  }
  .status.on { border-left-color: var(--green-1); }
  .status-dot {
    width: 8px; height: 8px; border-radius:50%;
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
    flex-shrink:0;
  }
  .status.on .status-dot { background: var(--green-1); box-shadow: 0 0 8px var(--green-1), 0 0 16px rgba(0,217,146,0.5); }
  .status-label {
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    color: var(--parch);
    letter-spacing: 0.4px;
  }
  .status.on .status-label { color: var(--green-2); }
  .status-time {
    margin-left:auto;
    font-family: var(--mono); font-size: 11px;
    color: var(--steel);
  }

  /* ===== Info grid ===== */
  .info {
    padding: 16px 24px 4px;
  }
  .info-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2.52px;
    color: var(--steel);
    margin-bottom: 10px;
    display:flex; align-items:center; gap:10px;
  }
  .info-title::before { content:''; width:14px; height:1px; background: var(--border-warm); }
  .info-title::after  { content:''; flex:1;   height:1px; background: var(--border-warm); }

  .info-grid {
    display:grid; grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .info-cell {
    background: var(--carbon);
    padding: 12px 14px;
  }
  .info-cell .k {
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--steel);
    margin-bottom: 5px;
  }
  .info-cell .v {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    color: var(--white-1);
    letter-spacing: -0.2px;
    line-height: 1.2;
  }
  .info-cell .v.green { color: var(--green-2); }
  .info-cell.span2 { grid-column: 1 / 3; }

  /* controls */
  .controls {
    display:grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 18px 24px 24px;
  }
  .btn {
    padding: 13px 16px;
    border-radius: 6px;
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    text-align: center;
  }
  .btn-start {
    background: var(--carbon);
    color: var(--green-2);
    border: 1px solid var(--green-1);
  }
  .btn-start:hover:not(:disabled) {
    background: rgba(0,217,146,0.08);
    box-shadow: 0 0 0 1px var(--green-1), 0 0 14px rgba(0,217,146,0.25) inset;
  }
  .btn-stop {
    background: var(--carbon);
    color: var(--danger);
    border: 1px solid var(--border-warm);
  }
  .btn-stop:hover:not(:disabled) {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(251,86,91,0.05);
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-full {
    grid-column: 1 / 3;
    background: transparent;
    color: var(--parch);
    border: 1px solid var(--border-warm);
  }
  .btn-full:hover { color: var(--white-1); border-color: var(--steel); }

  /* footer terminal line */
  .terminal {
    border-top: 1px solid var(--border);
    padding: 10px 24px 12px;
    font-family: var(--mono); font-size: 10.5px; color: var(--steel);
    letter-spacing: 0.3px;
    display:flex; align-items:center; gap: 8px;
    background: rgba(0,0,0,0.2);
  }
  .terminal .prompt { color: var(--green-1); }
  .terminal .caret {
    display:inline-block; width:7px; height:13px;
    background: var(--green-1); margin-left: 2px;
    animation: blink 1s steps(1) infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity:0; } }

  /* message toast */
  .msg {
    padding: 10px 24px 0;
    font-family: var(--mono); font-size: 11px;
    color: var(--steel);
    min-height: 14px;
    letter-spacing: 0.3px;
  }
  .msg.success { color: var(--green-2); }
  .msg.error   { color: var(--danger); }
</style>
</head>
<body>
<div class="window">
  <!-- Titlebar -->
  <div class="titlebar">
    <div class="tb-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="tb-text">dakal-tls // shadowtls ✕ shadowsocks</div>
    <div class="tb-sig" title="signal online"></div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-row">
      <div class="bolt">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 L4 14 h7 l-1 8 9-12 h-7 z"/></svg>
      </div>
      <div class="name">dakal<span style="color:var(--green-1)">-tls</span></div>
      <div class="tag">v5.0</div>
    </div>
    <div class="status on" id="status">
      <span class="status-dot"></span>
      <span class="status-label">CONNECTED</span>
      <span class="status-time">00:12:47</span>
    </div>
  </div>

  <!-- Info -->
  <div class="info">
    <div class="info-title">connection</div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="k">Server</div>
        <div class="v">ns.baft.uk</div>
      </div>
      <div class="info-cell">
        <div class="k">ShadowTLS</div>
        <div class="v">:8553</div>
      </div>
      <div class="info-cell">
        <div class="k">Shadowsocks</div>
        <div class="v">:8380</div>
      </div>
      <div class="info-cell">
        <div class="k">SNI</div>
        <div class="v">dl.google.com</div>
      </div>
      <div class="info-cell span2">
        <div class="k">SOCKS5 Local</div>
        <div class="v green">127.0.0.1:1080</div>
      </div>
    </div>
  </div>

  <!-- Message -->
  <div class="msg success" id="msg">[ok] proxy up · socks5 127.0.0.1:1080</div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-stop">■ Stop</button>
    <button class="btn btn-start">▶ Start</button>
    <button class="btn btn-full">⚙ Settings</button>
  </div>

  <!-- Terminal footer -->
  <div class="terminal">
    <span class="prompt">root@dakal:~$</span>
    <span>sing-box run --chain stls+ss</span>
    <span class="caret"></span>
  </div>
</div>
</body>
</html>
