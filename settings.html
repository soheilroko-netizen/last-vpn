<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stls v2 Settings</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div id="app">
      <div class="container settings-container">
        <h1>Settings</h1>
        <p class="subtitle">Configure connection settings</p>

        <!-- Profile selector -->
        <div class="profile-bar">
          <label for="profile-select">Profile:</label>
          <select id="profile-select">
            <option value="Default">Default</option>
          </select>
          <button type="button" id="btn-new-profile">New</button>
          <button type="button" id="btn-delete-profile">Delete</button>
        </div>

        <form id="settings-form" class="settings-form">
          <div class="form-group">
            <label for="server_address">Server Address</label>
            <input type="text" id="server_address" name="server_address" placeholder="ns.baft.uk" required />
          </div>

          <div class="form-group">
            <label for="ss_port">Shadowsocks Port</label>
            <input type="number" id="ss_port" name="ss_port" placeholder="8380" min="1" max="65535" required />
          </div>

          <div class="form-group">
            <label for="ss_password">Shadowsocks Password</label>
            <input type="password" id="ss_password" name="ss_password" placeholder="tE+3/qlN/..." required />
          </div>

          <div class="form-group">
            <label for="stls_port">ShadowTLS Port</label>
            <input type="number" id="stls_port" name="stls_port" placeholder="8553" min="1" max="65535" required />
          </div>

          <div class="form-group">
            <label for="stls_password">ShadowTLS Password</label>
            <input type="password" id="stls_password" name="stls_password" placeholder="y2lachetore" required />
          </div>

          <div class="form-group">
            <label for="stls_sni">ShadowTLS SNI (Server Name)</label>
            <input type="text" id="stls_sni" name="stls_sni" placeholder="dl.google.com" required />
          </div>

          <div class="form-group">
            <label for="socks5_port">SOCKS5 Local Port</label>
            <input type="number" id="socks5_port" name="socks5_port" placeholder="1080" min="1" max="65535" required />
          </div>

          <div class="controls">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" id="btn-back" class="btn btn-secondary">Close</button>
          </div>
        </form>

        <div id="message" class="message"></div>
      </div>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
