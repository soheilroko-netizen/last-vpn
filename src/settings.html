<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - stls v5</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <div id="app">
      <div class="container">
        <h1>Settings</h1>
        <p class="subtitle">Configure connection settings</p>
        
        <form id="settings-form" class="settings-form">
          <div class="form-group">
            <label for="server_address">Server Address</label>
            <input type="text" id="server_address" name="server_address" placeholder="ns.baft.uk" required />
          </div>

          <div class="form-group">
            <label for="server_port">Server Port</label>
            <input type="number" id="server_port" name="server_port" placeholder="5353" min="1" max="65535" required />
          </div>

          <div class="form-group">
            <label for="password">Shadowsocks Password</label>
            <input type="password" id="password" name="password" placeholder="baft123" required />
          </div>

          <div class="form-group">
            <label for="shadowtls_password">ShadowTLS Password</label>
            <input type="password" id="shadowtls_password" name="shadowtls_password" placeholder="shahabshahab" required />
          </div>

          <div class="form-group">
            <label for="socks5_port">SOCKS5 Local Port</label>
            <input type="number" id="socks5_port" name="socks5_port" placeholder="1080" min="1" max="65535" required />
          </div>

          <div class="controls">
            <button type="submit" class="btn btn-primary">Save Settings</button>
            <button type="button" id="btn-back" class="btn btn-secondary">Back</button>
          </div>
        </form>

        <div id="message" class="message"></div>
      </div>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
